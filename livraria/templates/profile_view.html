{% extends 'base.html' %}

{% block content %}
<div class="col-md-6 offset-md-3" >
    <h2 class="text-center" >Perfil</h2>
    <hr>
    <br>

    <div class="d-flex flex-column gap-3">
        <div class="text-center">
            <img style="border-radius:50%;max-width:200px;" src="{{user.userprofile.user_image.url}}">
        </div>
        <div>
            <label>Usuário:</label>
            <input type="text" class="form-control" value="{{user.username}}" readonly>
        </div>
        <div>
            <label>Nome:</label>
            <input type="text" class="form-control" value="{{user.first_name}}" readonly>
        </div>
        <div>
            <label>Sobrenome:</label>
            <input type="text" class="form-control" value="{{user.last_name}}" readonly>
        </div>
        <div>
            <label>Email:</label>
            <input type="text" class="form-control" value="{{user.email}}" readonly>
        </div>
        <div>
            <label>Cpf:</label>
            <input type="text" class="form-control" value="{{user.userprofile.cpf}}" readonly>
        </div>
        <div class="d-flex justify-content-center ">
            <a href="{% url 'profile_edit' %}">
                <button type="button" class="btn btn-primary btn-lg" >Editar Perfil</button>
            </a>
            
        </div> 
    </div>

</div>

{% endblock %}
