

<!-- Modal Status Navbar-->
<div id="cartStatusModal" class="modal fade" tabindex="-1" aria-labelledby="cartStatusLabel" aria-hidden="true">
    <div class="modal-dialog modal-dialog-centered modal-dialog-scrollable">
        <div class="modal-content">
            <div class="modal-header">
                <h4 class="modal-title ml-5" id="cartStatusLabel"><i class="bi bi-cart"></i> Status do Carrinho</h4>
                <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
            </div>
            <div class="modal-body">
                <h6>Itens Selecionados: 3</h6>
                <div>
                    <div class="d-flex align-items-center gap-5">
                        {% comment %} <img style="width:30px;" scr="./media/images/codigo_limpo.webp"> {% endcomment %}
                        <p>Imagem</p>
                        <p>Wyckoff 2.0</p>
                        <button class="btn btn-danger small-btn">Excluir</button>
                        {% comment %} <span>-</span> {% endcomment %}
                        <a href="#">
                            <i class="fa-solid fa-minus"></i>
                        </a>
                        
                        <span>1</span>
                        <a href="#">
                            <i class="fa-solid fa-plus"></i>
                        </a>
                        
                        {% comment %} <span>+</span> {% endcomment %}
                    </div>
                </div>
                {% comment %} <ul>
                    <li>Produto 1</li>
                    <li>Produto 2</li>
                    <li>Produto 3</li>
                </ul> {% endcomment %}
            </div>
            <div class="modal-footer">
                <button type="button" class="btn btn-danger" data-bs-dismiss="modal">Limpar Carrinho</button>
                <button type="button" class="btn btn-success" data-bs-dismiss="modal">Finalizar Compra</button>
                {% comment %} <button type="button" class="btn btn-primary" data-bs-dismiss="modal">Add ao Carrinho</button> {% endcomment %}
            </div>
        </div>
    </div>
</div>
